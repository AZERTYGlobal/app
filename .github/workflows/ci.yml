name: CI build + audit sécu

on:
  push:
    branches: [main, release/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write     # pour attestation SLSA / sigstore
  attestations: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore + publish x64
        run: dotnet publish src/AZERTYGlobal.csproj -c Release -r win-x64

      - name: Publish ARM64
        run: dotnet publish src/AZERTYGlobal.csproj -c Release -r win-arm64

      - name: Test
        run: dotnet test src/AZERTYGlobal.Tests/AZERTYGlobal.Tests.csproj -c Release

      - name: Pack MSIX
        run: pwsh ./scripts/Pack-MSIX.ps1

      - name: Verify Release
        run: pwsh ./scripts/Verify-Release.ps1

      - name: BinSkim hardening check
        run: |
          New-Item -ItemType Directory -Force -Path binskim-sarif | Out-Null
          dotnet tool install --global Microsoft.CodeAnalysis.BinSkim
          binskim analyze "src/bin/Release/net8.0-windows10.0.17763.0/win-x64/publish/AZERTY Global.exe" --output binskim-sarif/binskim-x64.sarif --pretty-print
          binskim analyze "src/bin/Release/net8.0-windows10.0.17763.0/win-arm64/publish/AZERTY Global.exe" --output binskim-sarif/binskim-arm64.sarif --pretty-print
        continue-on-error: true   # NuGet BinSkim install est instable, ne pas bloquer

      - name: Detect BinSkim SARIF
        id: binskim_sarif
        if: always()
        run: |
          $files = @(Get-ChildItem -Path binskim-sarif -Filter *.sarif -ErrorAction SilentlyContinue)
          if ($files.Count -gt 0) {
            "found=true" >> $env:GITHUB_OUTPUT
            $files | ForEach-Object { Write-Host "Found SARIF: $($_.FullName)" }
          } else {
            "found=false" >> $env:GITHUB_OUTPUT
            Write-Warning "No BinSkim SARIF report was generated; skipping SARIF upload."
          }

      - name: SHA256 artefacts
        run: |
          Get-FileHash -Algorithm SHA256 "src/bin/Release/net8.0-windows10.0.17763.0/win-x64/publish/AZERTY Global.exe"
          Get-FileHash -Algorithm SHA256 "src/bin/Release/net8.0-windows10.0.17763.0/win-arm64/publish/AZERTY Global.exe"
          Get-ChildItem . -Filter "AZERTYGlobal-*.msixbundle" | ForEach-Object { Get-FileHash -Algorithm SHA256 $_.FullName }

      - name: Upload msixbundle artefact
        uses: actions/upload-artifact@v4
        with:
          name: msixbundle
          path: AZERTYGlobal-*.msixbundle
          retention-days: 90

      - name: Attest provenance (SLSA L1)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'AZERTYGlobal-*.msixbundle'

      - name: Upload BinSkim SARIF
        if: always() && steps.binskim_sarif.outputs.found == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: binskim-sarif
